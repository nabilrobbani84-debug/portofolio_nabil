<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">FinTech Core API preview</title>
  <desc id="desc">Microservices dashboard preview with auth, transaction ledger, PostgreSQL, MySQL, gRPC, and Streamlit demo cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04131f"/>
      <stop offset="0.48" stop-color="#071827"/>
      <stop offset="1" stop-color="#061d1b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="0.52" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ledger" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <circle cx="105" cy="104" r="164" fill="#06b6d4" opacity="0.08"/>
  <circle cx="685" cy="360" r="172" fill="#10b981" opacity="0.08"/>

  <g transform="translate(46 36)">
    <rect width="708" height="378" rx="24" fill="#0f172a" opacity="0.86" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="1" y="1" width="706" height="58" rx="24" fill="#111827" opacity="0.96"/>
    <rect x="25" y="17" width="31" height="31" rx="10" fill="url(#accent)"/>
    <path d="M33 34h15M39 27v15M47 25c7 0 11 6 8 12" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <text x="70" y="35" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">FinTech Core API</text>
    <text x="220" y="35" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Auth</text>
    <text x="270" y="35" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Ledger</text>
    <text x="336" y="35" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Dashboard</text>
    <rect x="567" y="18" width="104" height="24" rx="12" fill="url(#accent)"/>
    <text x="619" y="34" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Go Services</text>
  </g>

  <g transform="translate(91 120)" filter="url(#shadow)">
    <rect width="178" height="238" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="24" y="36" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Auth Service</text>
    <text x="24" y="58" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">JWT, RBAC, bcrypt</text>
    <rect x="24" y="82" width="130" height="28" rx="10" fill="#111827"/>
    <text x="89" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">AES-GCM profile</text>
    <rect x="24" y="122" width="130" height="28" rx="10" fill="#111827"/>
    <text x="89" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#38bdf8">HMAC email lookup</text>
    <rect x="24" y="174" width="130" height="34" rx="12" fill="#1f2937" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="89" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#f59e0b">MySQL Users</text>
  </g>

  <g transform="translate(314 96)" filter="url(#shadow)">
    <rect width="210" height="282" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="26" y="38" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Transaction Ledger</text>
    <text x="26" y="60" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Deposit, withdraw, transfer</text>
    <rect x="26" y="86" width="158" height="42" rx="14" fill="#111827"/>
    <text x="45" y="111" font-family="Arial, sans-serif" font-size="12" fill="#e5e7eb">AC-1001</text>
    <text x="164" y="111" text-anchor="end" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#22c55e">Rp 24.7M</text>
    <rect x="26" y="142" width="158" height="42" rx="14" fill="#111827"/>
    <text x="45" y="167" font-family="Arial, sans-serif" font-size="12" fill="#e5e7eb">TRX-2404</text>
    <text x="164" y="167" text-anchor="end" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#38bdf8">Settled</text>
    <rect x="26" y="206" width="158" height="30" rx="11" fill="url(#ledger)"/>
    <text x="105" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#04111d">SELECT FOR UPDATE</text>
    <text x="105" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">integer amount_cents</text>
  </g>

  <g transform="translate(568 118)" filter="url(#shadow)">
    <rect width="142" height="104" rx="20" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="22" y="34" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">gRPC Link</text>
    <text x="22" y="56" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">ValidateToken</text>
    <rect x="22" y="72" width="98" height="14" rx="7" fill="#06b6d4" opacity="0.45"/>
  </g>

  <g transform="translate(568 258)" filter="url(#shadow)">
    <rect width="142" height="98" rx="20" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="22" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Live Demo</text>
    <text x="22" y="54" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Streamlit showcase</text>
    <rect x="22" y="70" width="98" height="12" rx="6" fill="#f43f5e" opacity="0.55"/>
  </g>

  <path d="M269 236 C292 236 292 160 314 160" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5 7" opacity="0.7"/>
  <path d="M524 184 C544 184 548 170 568 170" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5 7" opacity="0.7"/>
  <path d="M524 292 C544 292 548 307 568 307" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 7" opacity="0.7"/>
</svg>
